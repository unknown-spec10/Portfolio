name: Deploy On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0977081292
  REGION: us-central1
  SERVICE_NAME: deep-portfolio

jobs:
  deploy-cloud-run:
    name: Deploy App To Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Authenticate To Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Cloud Run Service
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

  deploy-firebase-rules:
    name: Deploy Firestore And Storage Rules
    runs-on: ubuntu-latest
    needs: deploy-cloud-run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Authenticate To Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Rules
        run: firebase deploy --project "$PROJECT_ID" --only firestore:rules,storage
